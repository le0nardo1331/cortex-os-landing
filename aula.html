  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #020617;
      --surface: #0f172a;
      --border:  #1e293b;
      --purple:  #a855f7;
      --blue:    #3b82f6;
      --text:    #f1f5f9;
      --muted:   #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .logo span { color: var(--purple); }

    /* ── PLAYER AREA ── */
    .player-wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 0;
    }

    .player-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
    }

    .player-title {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 800;
      margin-bottom: 24px;
      line-height: 1.2;
    }

    /* Container 16:9 para o player VTurb */
    .vturb-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .vturb-container > * {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Placeholder enquanto não configurar o VTurb */
    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      gap: 12px;
      text-align: center;
      padding: 20px;
    }

    .player-placeholder strong {
      color: var(--text);
      font-size: 16px;
    }

    /* ── BONUS ── */
    .bonus-wrap {
      width: 100%;
      max-width: 900px;
      margin: 40px auto 0;
      padding: 0 20px 60px;
    }

    .bonus-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .bonus-left { flex: 1; min-width: 200px; }

    .bonus-tag {
      display: inline-block;
      background: rgba(168,85,247,.15);
      color: var(--purple);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
      margin-bottom: 10px;
    }

    .bonus-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .bonus-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .btn-bonus {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--purple);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 22px;
      white-space: nowrap;
      transition: opacity .2s;
      flex-shrink: 0;
    }

    .btn-bonus:hover { opacity: .9; }

    /* ── INSTAGRAM CTA ── */
    .ig-wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 24px;
      text-align: center;
    }

    .ig-text {
      font-size: 14px;
      color: var(--muted);
    }

    .ig-text a {
      color: var(--purple);
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 500px) {
      .bonus-card { flex-direction: column; align-items: flex-start; }
      .btn-bonus  { width: 100%; justify-content: center; }
    }
  </style>
</head>
